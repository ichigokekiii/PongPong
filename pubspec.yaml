name: pongpong
description: "PongPong - phone-as-paddle motion table tennis multiplayer MVP."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  sensors_plus: ^7.0.0
  audioplayers: ^6.6.0
  vibration: ^3.1.8
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
